<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fun-O-Graphy</title>

  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Dark theme (default) */
    :root, [data-theme="dark"] {
      --bg: #0f1117;
      --surface: #181c27;
      --border: #2a2f3f;
      --accent: #e8c97e;
      --accent2: #6fc3c8;
      --text: #d4d8e8;
      --muted: #6b7190;
      --sidebar-bg: rgba(15,17,23,0.92);
      --ctrl-bg: rgba(15,17,23,0.92);
    }

    /* Light theme */
    [data-theme="light"] {
      --bg: #f4f4f0;
      --surface: #ffffff;
      --border: #d0d0c8;
      --accent: #a07830;
      --accent2: #2a7d82;
      --text: #1a1a2e;
      --muted: #888880;
      --sidebar-bg: rgba(255,255,255,0.92);
      --ctrl-bg: rgba(244,244,240,0.92);
    }

    /* Follow system preference when no manual override is set */
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #f4f4f0;
        --surface: #ffffff;
        --border: #d0d0c8;
        --accent: #a07830;
        --accent2: #2a7d82;
        --text: #1a1a2e;
        --muted: #888880;
        --sidebar-bg: rgba(255,255,255,0.92);
        --ctrl-bg: rgba(244,244,240,0.92);
      }
    }
    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      color: var(--text);
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      gap: 16px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .meta {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    #status-bar {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    #status-bar span {
      color: var(--accent2);
    }

    #map-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
    }
    
    #map {
      width: 100%;
      height: 100%;
    }

    #sidebar {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 240px;
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      backdrop-filter: blur(8px);
      z-index: 5;
      overflow: hidden;
    }

    .sidebar-head {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }

    #city-list {
      list-style: none;
      max-height: 320px;
      overflow-y: auto;
    }

    #city-list::-webkit-scrollbar {
      width: 4px;
    }

    #city-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .city-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      font-size: 0.78rem;
    }

    .city-item:last-child {
      border-bottom: none;
    }

    .city-item:hover {
      background: rgba(255,255,255,0.04);
    }

    .city-item.active {
      background: rgba(232,201,126,0.08);
    }

    .dot-icon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,201,126,0.25);
    }

    .dot-icon.secondary {
      background: var(--accent2);
      box-shadow: 0 0 0 3px rgba(111,195,200,0.2);
    }

    .city-name {
      flex: 1;
    }

    .city-cat {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .maplibregl-popup-content {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 4px !important;
      padding: 12px 16px !important;
      color: var(--text) !important;
      font-family: 'DM Mono', monospace !important;
      font-size: 0.8rem !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
      min-width: 160px;
    }

    .maplibregl-popup-tip {
      border-top-color: var(--border) !important;
    }

    .popup-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .popup-row {
      display: flex;
      gap: 8px;
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .popup-row span {
      color: var(--text);
    }

    .popup-cat {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(232,201,126,0.12);
      color: var(--accent);
    }

    .popup-cat.secondary {
      background: rgba(111,195,200,0.12);
      color: var(--accent2);
    }

    #controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 5;
    }

    .ctrl-btn {
      width: 36px;
      height: 36px;
      background: var(--ctrl-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      backdrop-filter: blur(8px);
    }

    .ctrl-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 20;
      gap: 16px;
      transition: opacity 0.4s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader-ring {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      color: var(--muted);
    }

    @media (max-width: 600px) { #sidebar { width: calc(100vw - 40px); } .meta { display: none; } }

  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Fun-O-Graphy</div>
    <div class="meta">GeoJSON · MapLibre GL · OpenFreeMap</div>
    <div id="status-bar">Loading …</div>
  </header>
  <div id="map-wrap">
    <div id="loading">
      <div class="loader-ring"></div>
      <div class="loader-text">LOADING MAP</div>
    </div>
    <div id="map"></div>
    <div id="sidebar">
      <div class="sidebar-head">Cities</div>
      <ul id="city-list"></ul>
    </div>
    <div id="controls">
      <button class="ctrl-btn" id="btn-theme"    title="Toggle light/dark mode">◐</button>
      <button class="ctrl-btn" id="btn-zoom-in"  title="Zoom in">+</button>
      <button class="ctrl-btn" id="btn-zoom-out" title="Zoom out">−</button>
      <button class="ctrl-btn" id="btn-fit"      title="Fit all points">⊡</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════

const GEOJSON_URL = './cities.geojson';

const BASEMAP_STYLES = {
  dark:  'https://tiles.openfreemap.org/styles/dark',
  light: 'https://tiles.openfreemap.org/styles/liberty',
};

// ═══════════════════════════════════════
// LAYER FILTER LOGIC
// OpenMapTiles / Liberty style layer schema:
//
// KEEP:
//   background               → map background
//   water / water-shadow     → oceans, lakes, rivers (fill)
//   boundary-land-level-2    → country borders (admin_level=2)
//   boundary-land-dispute    → disputed borders
//
// HIDE:
//   everything else: roads, buildings, landuse, POIs,
//   all labels, sub-national borders (admin 4+), etc.
// ═══════════════════════════════════════

function classifyLayer(layer) {
  const id   = layer.id.toLowerCase();
  const type = layer.type;

  // 1. Always keep background
  if (type === 'background') return 'keep';

  // 2. Keep water fills (no labels/names)
  if (type === 'fill' && (id.includes('water') || id.includes('ocean') || id.includes('sea'))) return 'keep';
  if (type === 'line' && id.startsWith('waterway') && !id.includes('label') && !id.includes('name')) return 'keep';

  // 3. Keep country borders only (admin_level 2)
  //    In the OpenMapTiles schema these layers are e.g.:
  //      "boundary-land-level-2", "boundary-country", "admin-2"
  if (id.includes('boundary') || id.includes('border') || id.includes('admin')) {
    const isCountryLevel =
      id.endsWith('-2') ||
      id.endsWith('_2') ||
      id.includes('level-2') ||
      id.includes('level_2') ||
      id.includes('country') ||
      id.includes('national');

    // Sub-national borders (states, counties, districts) → hide
    const isSubnational =
      id.includes('level-4') || id.includes('level_4') ||
      id.includes('level-6') || id.includes('level_6') ||
      id.includes('level-8') || id.includes('level_8') ||
      id.includes('-4') && id.includes('bound') ||
      id.includes('state') || id.includes('region') ||
      id.includes('county') || id.includes('district');

    if (isSubnational) return 'hide';
    if (isCountryLevel) return 'keep';

    // Unknown boundary layer → keep (better to show too many borders than too few)
    return 'keep';
  }

  // 4. Hide everything else: roads, buildings, landuse, labels, POIs, railways, airports, …
  return 'hide';
}

// Cross-check using the layer's own filter object —
// Liberty defines country borders via filter: ["==", "admin_level", 2]
function isBoundaryLayer(layer) {
  if (!layer.filter) return false;
  const f = JSON.stringify(layer.filter);
  return f.includes('"admin_level"') && (f.includes(',2]') || f.includes(',2,'));
}

function isSubnationalBoundary(layer) {
  if (!layer.filter) return false;
  const f = JSON.stringify(layer.filter);
  if (!f.includes('"admin_level"')) return false;
  // admin_level 4/6/8 = state, county, municipality
  return f.includes(',4]') || f.includes(',6]') || f.includes(',8]') ||
         f.includes(',4,') || f.includes(',6,') || f.includes(',8,');
}

// ═══════════════════════════════════════
// THEME
// ═══════════════════════════════════════

// Resolve initial theme: honour stored preference, otherwise follow the OS
function getInitialTheme() {
  const stored = localStorage.getItem('fog-theme');
  if (stored) return stored;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

let currentTheme = getInitialTheme();
document.documentElement.dataset.theme = currentTheme;

// ═══════════════════════
// MAP INIT
// ═══════════════════════

let cachedGeoJSON = null;

const map = new maplibregl.Map({
  container: 'map',
  style: BASEMAP_STYLES[currentTheme],
  center: [9.0, 52.0],
  zoom: 5.5,
  attributionControl: false,
});
map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-left');

function filterBasemapLayers() {
  map.getStyle().layers.forEach(layer => {
    if (isBoundaryLayer(layer)) return;
    if (isSubnationalBoundary(layer) || classifyLayer(layer) === 'hide') {
      map.setLayoutProperty(layer.id, 'visibility', 'none');
    }
  });
}

// Filter basemap on initial load
map.on('style.load', filterBasemapLayers);

function applyTheme(theme) {
  currentTheme = theme;
  localStorage.setItem('fog-theme', theme);
  document.documentElement.dataset.theme = theme;
  map.setStyle(BASEMAP_STYLES[theme]);
  // Use 'idle' instead of 'style.load' — fires once the style is fully ready
  // for addSource/addLayer calls (style.load fires too early after setStyle)
  map.once('idle', () => {
    filterBasemapLayers();
    if (cachedGeoJSON) addCityLayers(cachedGeoJSON);
  });
}

document.getElementById('btn-theme').addEventListener('click', () => {
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
});

// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════

async function loadGeoJSON() {
  const res = await fetch(GEOJSON_URL);
  if (!res.ok) throw new Error(`Failed to load GeoJSON: HTTP ${res.status}`);
  return res.json();
}

function filterVisible(geojson) {
  return { ...geojson, features: geojson.features.filter(f => f.properties.visible !== false) };
}

// ═══════════════════════════════════════
// RENDER CITIES
// ═══════════════════════════════════════

let activePopup = null;

function popupHTML(p, coords) {
  return `
    <div class="popup-name">${p.name}</div>
    ${p.info ? `<div class="popup-row">Info <span>${p.info}</span></div>` : ''}
    <div class="popup-row">Lon <span>${(+coords[0]).toFixed(4)}</span></div>
    <div class="popup-row">Lat <span>${(+coords[1]).toFixed(4)}</span></div>
    <div class="popup-cat ${p.category === 'secondary' ? 'secondary' : ''}">${p.category || 'default'}</div>
  `;
}

function addCityLayers(geojson) {
  const visible = filterVisible(geojson);

  map.addSource('cities', { type: 'geojson', data: visible });

  map.addLayer({
    id: 'cities-glow', type: 'circle', source: 'cities',
    paint: {
      'circle-radius': 16,
      'circle-color': ['match', ['get', 'category'],
        'primary',   'rgba(232,201,126,0.15)',
        'secondary', 'rgba(111,195,200,0.12)',
        'rgba(200,200,200,0.1)'
      ],
      'circle-blur': 0.7,
    }
  });

  map.addLayer({
    id: 'cities-dot', type: 'circle', source: 'cities',
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['zoom'], 4, 4, 10, 7],
      'circle-color': ['match', ['get', 'category'],
        'primary',   '#e8c97e',
        'secondary', '#6fc3c8',
        '#aaaaaa'
      ],
      'circle-stroke-width': 1.5,
      'circle-stroke-color': 'rgba(255,255,255,0.15)',
    }
  });

  // Labels for our own cities only — no basemap labels
  map.addLayer({
    id: 'cities-label', type: 'symbol', source: 'cities',
    layout: {
      'text-field': ['get', 'name'],
      'text-font': ['Noto Sans Regular'],
      'text-size': 11,
      'text-offset': [0, 1.4],
      'text-anchor': 'top',
      'text-allow-overlap': false,
    },
    paint: {
      'text-color': '#d4d8e8',
      'text-halo-color': 'rgba(15,17,23,0.9)',
      'text-halo-width': 1.5,
    }
  });

  map.on('click', 'cities-dot', (e) => {
    const p = e.features[0].properties;
    const coords = e.features[0].geometry.coordinates.slice();
    if (activePopup) activePopup.remove();
    activePopup = new maplibregl.Popup({ offset: 12, closeButton: false })
      .setLngLat(coords).setHTML(popupHTML(p, coords)).addTo(map);
    highlightSidebar(p.name);
  });
  map.on('mouseenter', 'cities-dot', () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', 'cities-dot', () => map.getCanvas().style.cursor = '');
}

function renderCities(geojson) {
  cachedGeoJSON = geojson;
  const visible = filterVisible(geojson);

  document.getElementById('status-bar').innerHTML =
    `<span>${visible.features.length}</span> / ${geojson.features.length} cities visible`;

  if (map.getSource('cities')) {
    map.getSource('cities').setData(visible);
  } else {
    addCityLayers(geojson);
  }

  buildSidebar(visible);
  document.getElementById('loading').classList.add('hidden');
}

// ═══════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════

function buildSidebar(geojson) {
  const list = document.getElementById('city-list');
  list.innerHTML = '';
  [...geojson.features]
    .sort((a,b) => a.properties.name.localeCompare(b.properties.name, 'en'))
    .forEach(f => {
      const p = f.properties, coords = f.geometry.coordinates;
      const li = document.createElement('li');
      li.className = 'city-item'; li.dataset.name = p.name;
      li.innerHTML = `
        <div class="dot-icon ${p.category === 'secondary' ? 'secondary' : ''}"></div>
        <span class="city-name">${p.name}</span>
        <span class="city-cat">${p.category || ''}</span>
      `;
      li.addEventListener('click', () => {
        map.flyTo({ center: coords, zoom: 9, speed: 1.2 });
        if (activePopup) activePopup.remove();
        activePopup = new maplibregl.Popup({ offset: 12, closeButton: false })
          .setLngLat(coords).setHTML(popupHTML(p, coords)).addTo(map);
        highlightSidebar(p.name);
      });
      list.appendChild(li);
    });
}

function highlightSidebar(name) {
  document.querySelectorAll('.city-item').forEach(el =>
    el.classList.toggle('active', el.dataset.name === name));
}

// ═══════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════

document.getElementById('btn-zoom-in').addEventListener('click',  () => map.zoomIn());
document.getElementById('btn-zoom-out').addEventListener('click', () => map.zoomOut());
document.getElementById('btn-fit').addEventListener('click', () => {
  const features = map.querySourceFeatures('cities');
  if (!features.length) return;
  const lngs = features.map(f => f.geometry.coordinates[0]);
  const lats  = features.map(f => f.geometry.coordinates[1]);
  map.fitBounds(
    [[Math.min(...lngs), Math.min(...lats)],[Math.max(...lngs), Math.max(...lats)]],
    { padding: 80, maxZoom: 10, duration: 800 }
  );
});

// ═══════════════════════════════════════
// START
// ═══════════════════════════════════════

map.on('load', async () => {
  const geojson = await loadGeoJSON();
  renderCities(geojson);
});
</script>
</body>
</html>
